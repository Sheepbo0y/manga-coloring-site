services:
  - type: web
    name: manga-coloring-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: manga-coloring-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://manga-coloring.vercel.app
      - key: UPLOAD_DIR
        value: ./uploads
      - key: COMFYUI_API_URL
        value: ""

databases:
  - name: manga-coloring-db
    plan: free
    databaseName: manga_coloring
    user: manga_coloring